[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
runner = [
	"qemu-system-riscv64",
	"-machine", "virt",
	"-bios", "none",
	"-monitor", "none",
	"-serial", "stdio",
	"-device", "virtio-gpu-device,xres=800,yres=600,max_outputs=1",
	"-display", "gtk,gl=off",
	"-kernel",
]
